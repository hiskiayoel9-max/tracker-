<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRACER GPS 100% ACCURATE</title>
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .box { background: #333; padding: 20px; border-radius: 15px; border: 2px solid #00ff00; }
        input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 85%; padding: 12px; background: #00ff00; color: black; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; }
        #status { margin-top: 20px; color: #00ff00; font-weight: bold; }
        .btn-map { display: none; margin-top: 15px; padding: 10px; background: #4285F4; color: white; text-decoration: none; border-radius: 5px; display: inline-block; }
    </style>
</head>
<body>

    <div class="box">
        <h1>TRACER PRO</h1>
        <p>Pelacak Nomor HP Akurasi 100%</p>
        <input type="text" id="phone" placeholder="Masukkan Nomor HP Target...">
        <button onclick="lacak()">MULAI LACAK</button>
        
        <div id="result">
            <p id="status">Status: Menunggu Input</p>
            <a id="linkMap" class="btn-map" target="_blank">LIHAT DI GOOGLE MAPS</a>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE (Ganti dengan milikmu agar data masuk ke HP-mu)
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            databaseURL: "https://tracer-xxxx.firebaseio.com",
            projectId: "tracer-xxxx",
            appId: "1:12345:web:abcd"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function lacak() {
            const no = document.getElementById('phone').value;
            const status = document.getElementById('status');
            const link = document.getElementById('linkMap');

            if(!no) { alert("Masukkan nomor HP!"); return; }
            status.innerText = "Status: Menghubungkan ke GPS Target...";

            // Mengambil data koordinat berdasarkan nomor HP
            db.ref('Tracer_Data/' + no).on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    status.innerText = "LOKASI DITEMUKAN! (Akurasi 100%)";
                    link.href = `https://www.google.com{data.lat},${data.lng}`;
                    link.style.display = "inline-block";
                    link.innerText = "BUKA LOKASI SEKARANG";
                } else {
                    status.innerText = "Gagal: Target tidak aktif atau aplikasi belum terpasang.";
                }
            });
        }
    </script>
</body>
</html>
